# ════════════════════════════════════════════════════════════════
#  Central Router
#
#  Single pod for the prototype. In production you'd run 2 with
#  active-passive VIP failover (e.g. keepalived or MetalLB).
# ════════════════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: kv-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kv-router
  template:
    metadata:
      labels:
        app: kv-router
    spec:
      containers:
        - name: router
          image: kv-router:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080

          env:
            - name: TOTAL_NODES
              value: "6"

            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

            - name: HB_TICK_MS
              value: "300"

            - name: HB_TIMEOUT
              value: "900"

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 2

          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "300m"
---
apiVersion: v1
kind: Service
metadata:
  name: kv-router-svc
spec:
  selector:
    app: kv-router
  ports:
    - port: 80
      targetPort: 8080
